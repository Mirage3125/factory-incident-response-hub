services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-factory_incidents}
      POSTGRES_USER: ${POSTGRES_USER:-factory}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-factory_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: runtime
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-factory}:${POSTGRES_PASSWORD:-factory_dev_password}@postgres:5432/${POSTGRES_DB:-factory_incidents}
      BACKEND_PORT: ${BACKEND_PORT:-8100}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-change-me-in-local-env}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3100}
      TIMEZONE: ${TIMEZONE:-Asia/Shanghai}
      LLM_DEMO_MODE: ${LLM_DEMO_MODE:-true}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      LLM_MODEL: ${LLM_MODEL:-demo-analyzer}
      LLM_TIMEOUT: ${LLM_TIMEOUT:-10}
      N8N_BASE_URL: ${N8N_BASE_URL:-http://n8n:5678}
      N8N_RESUME_TIMEOUT: ${N8N_RESUME_TIMEOUT:-5}
      RPA_WORKER_URL: ${RPA_WORKER_URL:-http://rpa-worker:8200}
      RPA_WORKER_TIMEOUT: ${RPA_WORKER_TIMEOUT:-30}
      RPA_ARTIFACT_ROOT: ${RPA_ARTIFACT_ROOT:-/artifacts/rpa}
      VIBRATION_P1_THRESHOLD: ${VIBRATION_P1_THRESHOLD:-8.0}
      TEMPERATURE_P1_THRESHOLD: ${TEMPERATURE_P1_THRESHOLD:-90.0}
      DEFECT_RATE_P2_THRESHOLD: ${DEFECT_RATE_P2_THRESHOLD:-5.0}
      REPEAT_ESCALATION_COUNT: ${REPEAT_ESCALATION_COUNT:-3}
      LOW_CONFIDENCE_THRESHOLD: ${LOW_CONFIDENCE_THRESHOLD:-0.6}
    ports:
      - "${BACKEND_PORT:-8100}:8100"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - rpa_artifacts:/artifacts/rpa:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8100/ready', timeout=2).read()"]
      interval: 10s
      timeout: 3s
      retries: 10

  postgres-init:
    image: postgres:16-alpine
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-factory_dev_password}
      N8N_POSTGRES_DB: ${N8N_POSTGRES_DB:-n8n}
      POSTGRES_USER: ${POSTGRES_USER:-factory}
    command:
      - sh
      - -c
      - |
        createdb -h postgres -U "$$POSTGRES_USER" "$$N8N_POSTGRES_DB" 2>/dev/null || true
    depends_on:
      postgres:
        condition: service_healthy

  n8n:
    image: ${N8N_IMAGE:-n8nio/n8n:latest}
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${N8N_POSTGRES_DB:-n8n}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-factory}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:-factory_dev_password}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-replace-with-32-plus-character-key}
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678/}
      N8N_BLOCK_ENV_ACCESS_IN_NODE: ${N8N_BLOCK_ENV_ACCESS_IN_NODE:-false}
      GENERIC_TIMEZONE: ${TIMEZONE:-Asia/Shanghai}
      TZ: ${TIMEZONE:-Asia/Shanghai}
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE:-true}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:-change-me}
      BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://backend:8100}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-change-me-in-local-env}
      RPA_WORKER_URL: ${RPA_WORKER_URL:-http://rpa-worker:8200}
      MES_API_URL: ${MES_API_URL:-http://legacy-mes:8300/api/work-orders}
    ports:
      - "${N8N_PORT:-5678}:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/workflows:ro
    depends_on:
      postgres-init:
        condition: service_completed_successfully
      backend:
        condition: service_healthy

  legacy-mes:
    build:
      context: .
      dockerfile: legacy-mes/Dockerfile
    environment:
      MES_DEMO_USERNAME: ${MES_DEMO_USERNAME:-mes-demo}
      MES_DEMO_PASSWORD: ${MES_DEMO_PASSWORD:-mes-password}
      MES_FAILURE_MODE: ${MES_FAILURE_MODE:-normal}
      MES_API_DELAY_SECONDS: ${MES_API_DELAY_SECONDS:-15}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-change-me-in-local-env}
    ports:
      - "${LEGACY_MES_PORT:-8300}:8300"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8300/ready', timeout=2).read()"]
      interval: 10s
      timeout: 3s
      retries: 10

  rpa-worker:
    build:
      context: .
      dockerfile: rpa-worker/Dockerfile
    environment:
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-change-me-in-local-env}
      LEGACY_MES_URL: ${LEGACY_MES_URL:-http://legacy-mes:8300}
      MES_DEMO_USERNAME: ${MES_DEMO_USERNAME:-mes-demo}
      MES_DEMO_PASSWORD: ${MES_DEMO_PASSWORD:-mes-password}
      RPA_HEADLESS: ${RPA_HEADLESS:-true}
      RPA_TIMEOUT_MS: ${RPA_TIMEOUT_MS:-10000}
      RPA_ARTIFACT_ROOT: ${RPA_ARTIFACT_ROOT:-/artifacts/rpa}
    ports:
      - "${RPA_WORKER_PORT:-8200}:8200"
    volumes:
      - rpa_artifacts:/artifacts/rpa
    depends_on:
      legacy-mes:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8200/ready', timeout=2).read()"]
      interval: 10s
      timeout: 3s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${FRONTEND_API_BASE_URL:-http://localhost:8100}
    environment:
      FRONTEND_PORT: ${FRONTEND_PORT:-3100}
    ports:
      - "${FRONTEND_PORT:-3100}:3100"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  n8n_data:
  rpa_artifacts:
